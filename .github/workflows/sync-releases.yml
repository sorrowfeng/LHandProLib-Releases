name: Sync Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync releases from source repository
        env:
          SRC_REPO: sorrowfeng/LHandProLib
          DST_REPO: sorrowfeng/LHandProLib-Releases
          SRC_TOKEN: ${{ secrets.SRC_REPO_TOKEN }}
          DST_TOKEN: ${{ github.token }}
        run: python -u .github/scripts/sync_releases.py

