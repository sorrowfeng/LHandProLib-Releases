name: Sync Releases

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Source LHandProLib release tag to mirror
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: sync-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Test release sync filters
        run: python -B .github/scripts/test_sync_releases.py

      - name: Sync source release
        env:
          TARGET_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          SRC_REPO: sorrowfeng/LHandProLib
          SRC_REPO_TOKEN: ${{ secrets.SRC_REPO_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: python -B -u .github/scripts/sync_releases.py
